<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>คลังรูปภาพกิจกรรม - ระบบอัลบั้ม</title>
  <link rel="manifest" href="/App-picture/manifest.json" />
  <meta name="theme-color" content="#0f2044" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { kanit: ['Kanit','sans-serif'] } } }
    };
  </script>
  <style>
    * { font-family: 'Kanit', sans-serif; }
    body { background: linear-gradient(145deg,#e8eef8,#f5f7fc,#eaf0fb); min-height:100vh; }
    .hero-bg { background: linear-gradient(135deg,#0f2044,#1e3a6e,#2a4f8f); position:relative; }
    .album-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 4px 24px rgba(15,32,68,.08); transition:transform .3s; cursor:pointer; }
    .album-card:hover { transform:translateY(-6px); box-shadow:0 16px 40px rgba(15,32,68,.16); }
    .spinner { width:44px; height:44px; border:4px solid #dde5f0; border-top-color:#0f2044; border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .badge { background:linear-gradient(135deg,#fdf3d7,#fce8a8); color:#7a5a0a; border:1px solid #e6c76a; font-size:.7rem; padding:2px 10px; border-radius:999px; font-weight:600; }
  </style>
</head>
<body>

<header class="hero-bg text-white py-10 px-6">
  <div class="max-w-4xl mx-auto text-center">
    <h1 class="text-4xl font-bold mb-2">คลังรูปภาพกิจกรรม</h1>
    <p class="text-blue-200 text-sm">ระบบจัดการอัลบั้มภาพกิจกรรมหน่วยงาน</p>
    <button onclick="openCreateAlbum()" class="mt-6 bg-yellow-400 hover:bg-yellow-300 text-navy font-semibold text-sm px-6 py-2.5 rounded-full shadow-lg transition">
      ➕ สร้างอัลบั้มใหม่
    </button>
  </div>
</header>

<main id="app" class="max-w-7xl mx-auto px-4 py-8">
  <!-- Loading -->
  <div id="loading" class="flex flex-col items-center py-20 gap-4">
    <div class="spinner"></div>
    <p class="text-navy font-medium text-sm">กำลังโหลด...</p>
  </div>

  <!-- Album List -->
  <div id="album-list" class="hidden">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold text-navy">อัลบั้มทั้งหมด</h2>
      <span id="album-count" class="text-sm text-blue-400"></span>
    </div>
    <div id="albums-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <!-- Album Detail -->
  <div id="album-detail" class="hidden">
    <button onclick="backToList()" class="text-navy hover:text-blue-600 mb-4 flex items-center gap-2">
      ← กลับ
    </button>
    <div class="bg-white rounded-2xl p-6 mb-6">
      <div class="flex justify-between items-start mb-4">
        <div class="flex-1">
          <span id="detail-badge" class="badge mb-2 inline-block"></span>
          <h2 id="detail-title" class="text-2xl font-bold text-navy"></h2>
          <p id="detail-date" class="text-sm text-blue-400 mt-1"></p>
        </div>
        <button onclick="openAddPhoto()" class="bg-navy text-yellow-300 px-4 py-2 rounded-full text-sm font-semibold hover:opacity-80">
          📸 เพิ่มรูปภาพ
        </button>
      </div>
      <p id="detail-desc" class="text-gray-600"></p>
      <p id="detail-count" class="text-sm text-blue-400 mt-3"></p>
    </div>
    <div id="photos-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </div>
</main>

<!-- Create Album Modal -->
<div id="create-album-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl max-w-lg w-full p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold text-navy">สร้างอัลบั้มใหม่</h3>
      <button onclick="closeCreateAlbum()" class="text-gray-400 hover:text-navy text-2xl">✕</button>
    </div>
    <div class="flex flex-col gap-4">
      <div><label class="text-sm font-semibold text-navy mb-1 block">ชื่ออัลบั้ม *</label>
        <input id="album-title" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-navy" placeholder="เช่น กิจกรรมสงกรานต์ 2568" /></div>
      <div><label class="text-sm font-semibold text-navy mb-1 block">คำอธิบาย</label>
        <textarea id="album-desc" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-navy resize-none" rows="3"></textarea></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-sm font-semibold text-navy mb-1 block">หมวดหมู่</label>
          <input id="album-cat" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-navy" /></div>
        <div><label class="text-sm font-semibold text-navy mb-1 block">วันที่</label>
          <input id="album-date" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-navy" /></div>
      </div>
      <button onclick="submitCreateAlbum()" class="bg-navy text-yellow-300 font-semibold py-3 rounded-xl hover:opacity-90">สร้างอัลบั้ม</button>
    </div>
  </div>
</div>

<!-- Add Photo Modal -->
<div id="add-photo-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl max-w-lg w-full p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold text-navy">เพิ่มรูปภาพ</h3>
      <button onclick="closeAddPhoto()" class="text-gray-400 hover:text-navy text-2xl">✕</button>
    </div>
    <div class="flex flex-col gap-4">
      <div>
        <div id="photo-drop" onclick="document.getElementById('photo-input').click()" class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-navy">
          <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelect(this.files[0])" />
          <div id="photo-placeholder"><p class="text-4xl mb-2">📸</p><p class="text-sm text-navy font-semibold">แตะเพื่อเลือกรูป</p></div>
          <div id="photo-preview" class="hidden"><img id="preview-img" class="max-h-48 mx-auto rounded-lg" /><p id="preview-name" class="text-xs mt-2"></p></div>
        </div>
      </div>
      <div><label class="text-sm font-semibold text-navy mb-1 block">คำบรรยาย (ไม่จำเป็น)</label>
        <input id="photo-caption" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-navy" placeholder="คำอธิบายรูปนี้" /></div>
      <button onclick="submitAddPhoto()" id="upload-btn" class="bg-navy text-yellow-300 font-semibold py-3 rounded-xl hover:opacity-90">อัปโหลดรูปภาพ</button>
      <button onclick="finishAddPhoto()" class="bg-gray-100 text-gray-600 font-semibold py-2 rounded-xl hover:bg-gray-200">เสร็จสิ้น</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwq_zg3pdHNxVq9NvqfbEpXV80CDvSwoT4nmydxezRsu3-kKU8chi02U8MlweTyPcX/exec';
let albums = [];
let currentAlbumId = null;
let selectedFile = null;

document.addEventListener('DOMContentLoaded', fetchAlbums);

async function fetchAlbums() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAlbums&_=' + Date.now());
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    albums = json.data || [];
    renderAlbums();
  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
  }
}

function renderAlbums() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('album-list').classList.remove('hidden');
  document.getElementById('album-count').textContent = albums.length + ' อัลบั้ม';
  const grid = document.getElementById('albums-grid');
  grid.innerHTML = '';
  albums.forEach(album => {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.onclick = () => openAlbum(album.albumId);
    card.innerHTML = `
      <div style="aspect-ratio:16/9;background:#dde5f0;overflow:hidden">
        ${album.coverImageUrl ? `<img src="${album.coverImageUrl}" style="width:100%;height:100%;object-fit:cover">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem">📁</div>`}
      </div>
      <div class="p-4">
        ${album.category ? `<span class="badge mb-2 inline-block">${album.category}</span>` : ''}
        <h3 class="text-navy font-bold text-sm mb-1">${album.title}</h3>
        <p class="text-xs text-blue-400">${album.date} • ${album.photoCount} รูป</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

async function openAlbum(albumId) {
  currentAlbumId = albumId;
  document.getElementById('album-list').classList.add('hidden');
  document.getElementById('album-detail').classList.remove('hidden');
  try {
    const [detailRes, photosRes] = await Promise.all([
      fetch(SCRIPT_URL + '?action=getAlbumDetail&albumId=' + albumId),
      fetch(SCRIPT_URL + '?action=getPhotos&albumId=' + albumId),
    ]);
    const detail = await detailRes.json();
    const photos = await photosRes.json();
    if (!detail.success || !photos.success) throw new Error('ไม่สามารถโหลดข้อมูล');
    const album = detail.data;
    document.getElementById('detail-badge').textContent = album.category || '';
    document.getElementById('detail-title').textContent = album.title;
    document.getElementById('detail-date').textContent = '📅 ' + album.date;
    document.getElementById('detail-desc').textContent = album.description || 'ไม่มีคำอธิบาย';
    document.getElementById('detail-count').textContent = album.photoCount + ' รูปภาพ';
    const grid = document.getElementById('photos-grid');
    grid.innerHTML = '';
    (photos.data || []).forEach(photo => {
      const div = document.createElement('div');
      div.className = 'rounded-lg overflow-hidden shadow cursor-pointer hover:scale-105 transition';
      div.style.aspectRatio = '1';
      div.innerHTML = `<img src="${photo.imageUrl}" style="width:100%;height:100%;object-fit:cover" />`;
      grid.appendChild(div);
    });
  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
  }
}

function backToList() {
  currentAlbumId = null;
  document.getElementById('album-detail').classList.add('hidden');
  document.getElementById('album-list').classList.remove('hidden');
}

function openCreateAlbum() {
  document.getElementById('create-album-modal').classList.remove('hidden');
  document.getElementById('album-date').value = new Date().toISOString().split('T')[0];
}
function closeCreateAlbum() {
  document.getElementById('create-album-modal').classList.add('hidden');
}

async function submitCreateAlbum() {
  const title = document.getElementById('album-title').value.trim();
  if (!title) { alert('กรุณาระบุชื่ออัลบั้ม'); return; }
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'createAlbum',
        title,
        description: document.getElementById('album-desc').value.trim(),
        category: document.getElementById('album-cat').value.trim(),
        date: document.getElementById('album-date').value,
      }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    alert('✅ สร้างอัลบั้มสำเร็จ!');
    closeCreateAlbum();
    fetchAlbums();
  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
  }
}

function openAddPhoto() {
  if (!currentAlbumId) return;
  document.getElementById('add-photo-modal').classList.remove('hidden');
}
function closeAddPhoto() {
  document.getElementById('add-photo-modal').classList.add('hidden');
  selectedFile = null;
}
function finishAddPhoto() {
  closeAddPhoto();
  openAlbum(currentAlbumId);
}

function handlePhotoSelect(file) {
  if (!file || !file.type.startsWith('image/')) { alert('กรุณาเลือกไฟล์รูปภาพ'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('photo-placeholder').classList.add('hidden');
    document.getElementById('photo-preview').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

async function submitAddPhoto() {
  if (!selectedFile) { alert('กรุณาเลือกรูปภาพก่อน'); return; }
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังอัปโหลด...';
  try {
    const base64 = await readFileAsBase64(selectedFile);
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'uploadPhoto',
        albumId: currentAlbumId,
        fileData: base64,
        fileName: selectedFile.name,
        mimeType: selectedFile.type,
        caption: document.getElementById('photo-caption').value.trim(),
      }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    alert('✅ อัปโหลดสำเร็จ! เพิ่มรูปต่อได้');
    selectedFile = null;
    document.getElementById('photo-input').value = '';
    document.getElementById('photo-caption').value = '';
    document.getElementById('photo-placeholder').classList.remove('hidden');
    document.getElementById('photo-preview').classList.add('hidden');
  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'อัปโหลดรูปภาพ';
  }
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
